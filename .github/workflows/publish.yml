# Build and publish the package to PyPI when a GitHub release is published.
#
# SETUP — add this secret to your repository:
#   Settings → Secrets and variables → Actions → New repository secret
#
#   PYPI_TOKEN   a PyPI API token (starts with "pypi-")
#
# The version is derived from the git tag by pdm-backend (SCM versioning), so
# there is nothing to hand-edit: create a GitHub release whose tag is the new
# version number (e.g. tag "0.2.0" publishes hsbt 0.2.0). The tag must be a new
# version — PyPI rejects re-uploading a version that already exists.
#
# workflow_dispatch runs off whatever commit/tag you pick; if that commit is not
# exactly on a tag the version will be a dev version that PyPI won't accept —
# publish real releases via the release event, not manual dispatch.

name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:     # allow manual trigger from the Actions tab

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest

    steps:
      # fetch-depth: 0 + tags so pdm-backend can derive the version from the
      # release tag (a shallow checkout has no tags and versioning would fail).
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install PDM
        run: pip install pdm --quiet

      - name: Build sdist and wheel
        run: pdm build

      - name: Publish to PyPI
        env:
          PDM_PUBLISH_USERNAME: __token__
          PDM_PUBLISH_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: pdm publish --no-build
